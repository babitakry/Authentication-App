<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora | Secure Identity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Aurora Background Lights -->
    <div class="aurora-container">
        <div class="aurora-light top-[-20%] left-[-10%]" style="background: var(--aurora-1);"></div>
        <div class="aurora-light bottom-[-20%] right-[-10%]" style="background: var(--aurora-2); animation-delay: -5s;"></div>
        <div class="aurora-light top-[20%] right-[10%]" style="background: var(--aurora-3); animation-delay: -10s; opacity: 0.1;"></div>
    </div>

    <!-- Main Container -->
    <main class="w-full max-w-[1400px] flex items-center justify-center relative p-6">
        
        <!-- Toast System -->
        <div id="toast" class="fixed top-10 right-10 z-[100] transform translate-x-[150%] transition-all duration-500 pointer-events-none">
            <div class="luminous-card flex items-center gap-4 bg-slate-900/90">
                <span id="toast-icon"></span>
                <p id="toast-message" class="font-semibold text-sm"></p>
            </div>
        </div>

        <!-- Authentication View -->
        <div id="auth-section" class="w-full flex justify-center">
            
            <!-- Login -->
            <div id="login-view" class="luminous-card reveal">
                <header class="text-center mb-10">
                    <h1 class="text-4xl font-extrabold tracking-tight mb-2">Welcome Back</h1>
                    <p class="text-slate-400 font-medium">Please enter your details to continue</p>
                </header>

                <form id="login-form" class="space-y-2">
                    <div class="input-group">
                        <label class="input-label">Username</label>
                        <div class="input-container">
                            <input type="text" id="login-username" required class="input-field" placeholder="Enter your identity">
                            <svg class="input-icon w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                        </div>
                    </div>
                    <div class="input-group">
                        <label class="input-label">Password</label>
                        <div class="input-container">
                            <input type="password" id="login-password" required class="input-field" placeholder="••••••••">
                            <svg class="input-icon w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                        </div>
                    </div>
                    <div class="pt-4">
                        <button type="submit" class="aurora-btn">Sign In to Dashboard</button>
                    </div>
                </form>

                <footer class="mt-10 text-center">
                    <p class="text-slate-400 text-sm font-medium">
                        New here? <button onclick="toggleView('register')" class="text-indigo-400 hover:text-indigo-300 transition-colors font-bold">Create an account</button>
                    </p>
                </footer>
            </div>

            <!-- Register -->
            <div id="register-view" class="luminous-card hidden reveal" style="max-width: 520px;">
                <header class="text-center mb-8">
                    <h1 class="text-4xl font-extrabold tracking-tight mb-2">Join Aurora</h1>
                    <p class="text-slate-400 font-medium">Create your secure profile today</p>
                </header>

                <form id="register-form" class="space-y-1">
                    <div class="input-group">
                        <label class="input-label">Choose Username</label>
                        <div class="input-container">
                            <input type="text" id="reg-username" required class="input-field" placeholder="johndoe">
                            <svg class="input-icon w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                        </div>
                    </div>
                    <div class="input-group">
                        <label class="input-label">Email Address</label>
                        <div class="input-container">
                            <input type="email" id="reg-email" required class="input-field" placeholder="john@example.com">
                            <svg class="input-icon w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                        </div>
                    </div>
                    <div class="input-group">
                        <label class="input-label">Secure Password</label>
                        <div class="input-container">
                            <input type="password" id="reg-password" required class="input-field" placeholder="••••••••">
                            <svg class="input-icon w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                        </div>
                    </div>
                    <div class="input-group">
                        <label class="input-label">Account Type</label>
                        <div class="input-container">
                            <select id="reg-role" class="input-field appearance-none cursor-pointer">
                                <option value="USER">Personal Account</option>
                                <option value="ADMIN">Administrator Account</option>
                            </select>
                            <svg class="input-icon w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
                        </div>
                    </div>
                    <div class="pt-4">
                        <button type="submit" class="aurora-btn" style="background: linear-gradient(135deg, var(--aurora-2) 0%, var(--aurora-1) 100%);">Complete Registration</button>
                    </div>
                </form>

                <footer class="mt-8 text-center">
                    <p class="text-slate-400 text-sm font-medium">
                        Already joined? <button onclick="toggleView('login')" class="text-purple-400 hover:text-purple-300 transition-colors font-bold">Sign in here</button>
                    </p>
                </footer>
            </div>
        </div>

        <!-- Profile View -->
        <div id="profile-section" class="w-full max-w-4xl hidden reveal">
            <div class="luminous-card flex flex-col md:flex-row items-center gap-12" style="max-width: 100%;">
                <div class="relative">
                    <div class="w-40 h-40 rounded-full bg-gradient-to-tr from-indigo-500 to-purple-500 flex items-center justify-center text-6xl font-extrabold text-white shadow-2xl border-[8px] border-white/5" id="user-avatar">
                        A
                    </div>
                </div>
                <div class="flex-1 text-center md:text-left">
                    <span id="profile-role" class="px-4 py-1 rounded-full bg-indigo-500/10 text-indigo-400 text-[10px] font-bold uppercase tracking-widest inline-block mb-4 border border-indigo-500/20">Authorized User</span>
                    <h2 id="profile-name" class="text-5xl font-extrabold text-white tracking-tight mb-2">User Name</h2>
                    <p id="profile-email" class="text-slate-400 text-xl font-medium mb-8">user@example.com</p>
                    
                    <div class="flex flex-wrap justify-center md:justify-start gap-4">
                        <div class="px-6 py-3 rounded-2xl bg-white/5 border border-white/5 flex flex-col">
                            <span class="text-[9px] text-slate-500 uppercase font-bold tracking-widest mb-1">Account ID</span>
                            <span id="profile-id" class="text-xs font-mono text-white/80">---</span>
                        </div>
                        <button onclick="handleLogout()" class="px-8 py-3 rounded-2xl bg-red-500/10 text-red-400 hover:bg-red-500 hover:text-white transition-all font-bold text-sm">
                            Log Out
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Global Loader -->
    <div id="loader" class="fixed inset-0 bg-[#050508]/95 backdrop-blur-3xl z-[200] flex items-center justify-center hidden">
        <div class="flex flex-col items-center gap-6">
            <div class="w-12 h-12 border-4 border-indigo-500/20 border-t-indigo-500 rounded-full animate-spin"></div>
            <p class="text-indigo-400 font-bold tracking-widest text-xs uppercase animate-pulse">Establishing Connection</p>
        </div>
    </div>

    <script type="module" src="/main.js"></script>
</body>
</html>
